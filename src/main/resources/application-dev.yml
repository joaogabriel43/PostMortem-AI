# ──────────────────────────────────────────────────────────────────────────────
# Profile: dev
# P6Spy intercepts the DataSource to log all SQL queries and detect N+1 issues.
# ──────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    # P6Spy wraps the real driver — the actual JDBC URL must use the p6spy prefix.
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    url: ${DATABASE_URL_DEV:jdbc:p6spy:postgresql://localhost:5432/postmortemai}
    username: ${DATABASE_USERNAME:postmortemai}
    password: ${DATABASE_PASSWORD:changeme}

  jpa:
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.postmortemai: DEBUG
    org.springframework.web: DEBUG
    org.flywaydb: DEBUG
