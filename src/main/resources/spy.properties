# ──────────────────────────────────────────────────────────────────────────────
# P6Spy configuration — active only in the 'dev' Spring profile
# Intercepts all JDBC calls to log SQL and detect N+1 query patterns.
# ──────────────────────────────────────────────────────────────────────────────

# Delegate to the real PostgreSQL driver
driverlist=org.postgresql.Driver

# Use SLF4J so all SQL output flows through the application's logging framework
appender=com.p6spy.engine.spy.appender.Slf4JLogger

# Multi-line format improves readability of complex queries
logMessageFormat=com.p6spy.engine.spy.appender.MultiLineFormat

# Log only queries that take longer than 0 ms (i.e., log everything in dev)
executionThreshold=0

# Do not log connection open/close events — too noisy
excludecategories=info,debug,result,resultset,batch
